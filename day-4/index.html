<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
            background: #333;
        }
        body{
            overflow: hidden;
            position: relative;
            padding: 30px;
        }
        .box{
            position: absolute;
            transition: cubic-bezier(0.19, 1, 0.22, 1) 1s;
            height: 250px;
            width: 250px;
            background-color: red;
        }

        li{
            color: white;
            cursor: pointer;
        }
        .lt{
            text-decoration: line-through;
            color: red;
        }
    </style>
</head>
<body>
     
   <ul>
    <li>apple</li>
    <li>banana</li>
    <li>orange</li>
    <li>grapes</li>
    <li>pineapple</li>
<li>pineapple</li>
<li>pineapple</li>
   </ul>
</body>
<script src="script.js"></script>
</html>
